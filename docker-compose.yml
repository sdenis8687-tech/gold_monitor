services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gold
      POSTGRES_PASSWORD: goldpass
      POSTGRES_DB: goldmonitor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gold -d goldmonitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrator:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://gold:goldpass@postgres:5432/goldmonitor
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "cd /app/packages/db && ./node_modules/.bin/prisma db push --skip-generate"
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://gold:goldpass@postgres:5432/goldmonitor
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://gold:goldpass@postgres:5432/goldmonitor
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    restart: unless-stopped

  backfill:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://gold:goldpass@postgres:5432/goldmonitor
      MOEX_BASE_URL: https://iss.moex.com
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    command: node apps/worker/dist/backfill.js
    restart: "no"
    profiles:
      - backfill

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
